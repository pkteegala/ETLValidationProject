version: 2

models:

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: qty
        tests:
          - not_null

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: sales_mart
    columns:
      - name: total_revenue
        tests:
          - not_null